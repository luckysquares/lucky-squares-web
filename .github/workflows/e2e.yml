name: E2E tests

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Wait for Vercel to finish deploying dev before running tests.
      # The Vercel CLI checks deployment status via the API.
      - name: Wait for dev deployment
        run: |
          npx vercel-deploy-wait --token ${{ secrets.VERCEL_TOKEN }} \
            --team-id ${{ secrets.VERCEL_TEAM_ID }} \
            --project-id ${{ secrets.VERCEL_PROJECT_ID }} \
            --timeout 300 || true
        # "|| true" — if the wait tool isn't configured yet, tests run anyway
        # against whatever is currently live on dev

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL:              https://dev.luckysquares.com.au
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
